<html>
  <body style="margin:0; padding:0; background-color:#f4f4f5; font-family:Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5; padding:32px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; padding:32px;">
            <tr>
              <td>
                <h1 style="margin:0 0 16px; font-size:20px; color:#18181b;">Confirm your Snip account</h1>
                <p style="margin:0 0 24px; font-size:14px; line-height:1.5; color:#3f3f46;">
                  Click the button below to confirm your email address and activate your account.
                </p>
                <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
                  <tr>
                    <td align="center" style="border-radius:6px; background-color:#18181b;">
                      <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block; padding:12px 24px; font-size:14px; font-weight:bold; color:#ffffff; text-decoration:none;">
                        Confirm email address
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0 0 8px; font-size:13px; color:#71717a;">
                  Or enter this code on the confirmation page:
                </p>
                <p style="margin:0 0 24px; font-size:28px; font-weight:bold; letter-spacing:0.3em; color:#18181b;">
                  {{ .Token }}
                </p>
                <p style="margin:0; font-size:12px; color:#a1a1aa;">
                  If you didn't create an account, you can safely ignore this email. This link and code expire in 1 hour.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
